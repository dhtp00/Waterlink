<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>워터링크 MVP 데모 통합 포털</title>
  
  <!-- Pretendard 폰트 불러오기 -->
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
  <!-- FontAwesome 아이콘 불러오기 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      background: #0f172a;
      color: #ffffff;
      font-family: 'Pretendard', -apple-system, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
      background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
    }
    
    .container {
      text-align: center;
      max-width: 800px;
      padding: 2rem;
    }
    
    .logo-area {
      display: inline-flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 0.5rem;
    }
    
    .logo-area i {
      font-size: 3rem;
      color: #00f2fe;
      filter: drop-shadow(0 0 10px rgba(0, 242, 254, 0.5));
    }
    
    .logo-area span {
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: 2px;
      color: #ffffff;
    }
    
    p {
      color: #94a3b8;
      font-size: 1.2rem;
      margin-bottom: 3.5rem;
      font-weight: 400;
    }
    
    .btn-group {
      display: flex;
      gap: 2.5rem;
      justify-content: center;
    }
    
    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1.5px solid rgba(0, 242, 254, 0.15);
      border-radius: 16px;
      padding: 3rem 2rem;
      width: 280px;
      text-decoration: none;
      color: white;
      transition: all 0.3s ease;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
    }
    
    .card i {
      font-size: 3.5rem;
      margin-bottom: 1.5rem;
      transition: all 0.3s ease;
    }
    
    .card.app i {
      color: #00f2fe;
      text-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
    }
    
    .card.dashboard i {
      color: #38bdf8;
      text-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
    }
    
    .card:hover {
      transform: translateY(-8px);
      border-color: #00f2fe;
      background: rgba(0, 242, 254, 0.04);
      box-shadow: 0 15px 40px rgba(0, 242, 254, 0.15);
    }
    
    .card:hover i {
      transform: scale(1.1);
    }
    
    .card h2 {
      font-size: 1.6rem;
      font-weight: 700;
      margin: 0 0 0.8rem 0;
      color: #ffffff;
    }
    
    .card span {
      color: #64748b;
      font-size: 0.95rem;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-area">
      <i class="fa-solid fa-droplet"></i>
      <span>WATER LINK</span>
    </div>
    <p>상수도 특화 시공 이미지 수집 및 관급 공무 행정 자동화 시스템 데모 포털</p>
    
    <div class="btn-group">
      <a href="app.html" target="_blank" class="card app">
        <i class="fa-solid fa-mobile-screen-button"></i>
        <h2>현장 전송 앱</h2>
        <span>[현장 시공 소장용]<br>실시간 시공 사진 촬영 전송 및 AI 판독 수집 단말 시뮬레이터</span>
      </a>
      
      <a href="dashboard.html" target="_blank" class="card dashboard">
        <i class="fa-solid fa-desktop"></i>
        <h2>관리 대시보드</h2>
        <span>[사무실 대리인용]<br>시공 검측 데이터 수집 모니터링 및 지자체 표준 사진대지 엑셀 자동화</span>
      </a>
    </div>
  </div>
</body>
</html>
